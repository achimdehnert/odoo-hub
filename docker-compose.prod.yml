# docker-compose.prod.yml — odoo-hub Production Stack
# Target: Hetzner CPX32 (4 vCPU, 8 GB RAM, 160 GB Disk), odoo-prod (46.225.127.211)
# Stack: Traefik + Odoo 18 + PgBouncer + PostgreSQL 16
#
# Secrets Management (ADR-045 — Variante C: Hybrid SOPS + file-based):
#   - Sensitive Werte (Passwörter) kommen aus /run/secrets/ (tmpfs, ADR-045)
#   - Non-sensitive Compose-Interpolation (.env.prod) für ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG
#   - .env.prod wird im CI/CD aus /run/secrets/ generiert (kein manuelles Editieren)
#   - Nach Reboot: secrets-check.service blockiert Docker bis CI/CD re-deployed
#
# Anforderungen:
#   - Docker >= 25, Compose V2
#   - /run/secrets/ befüllt via CI/CD (SOPS-Decrypt, ADR-045 Phase 5)
#   - .env.prod generiert via CI/CD aus /run/secrets/ (ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG)
#   - docker/db/init.sql vorhanden (nl2sql_ro Role Setup)
#
# Idempotent: mehrfaches `docker compose up -d` ist sicher.
# Netzwerk: DB + PgBouncer nur intern erreichbar (internal: true).
# Ressourcen: Limits verhindern, dass NL2SQL-Queries den Host erschöpfen.

services:

  # ── Traefik Reverse Proxy ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: odoo_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - proxy

  # ── Odoo 18 Web ────────────────────────────────────────────────────────────
  web:
    image: odoo:18.0
    container_name: odoo_web
    restart: unless-stopped
    # Non-sensitive Compose-Vars (ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG, POSTGRES_USER, POSTGRES_DB)
    # Passwörter werden NUR über /run/secrets/ übergeben (ADR-045).
    env_file: .env.prod
    # Kein direktes Port-Mapping — Traffic läuft ausschließlich über Traefik
    expose:
      - "8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
      # Secrets aus /run/secrets/ als Read-Only in Container mounten (ADR-045)
      - /run/secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.odoo.rule=Host(`${ODOO_DOMAIN}`)"
      - "traefik.http.routers.odoo.entrypoints=websecure"
      - "traefik.http.routers.odoo.tls.certresolver=le"
      - "traefik.http.services.odoo.loadbalancer.server.port=8069"
      # Odoo Websocket (longpolling)
      - "traefik.http.routers.odoo-longpoll.rule=Host(`${ODOO_DOMAIN}`) && PathPrefix(`/longpolling`)"
      - "traefik.http.routers.odoo-longpoll.entrypoints=websecure"
      - "traefik.http.routers.odoo-longpoll.tls.certresolver=le"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── PostgreSQL 16
  # NOTE: PgBouncer wird nachgerüstet sobald passendes Docker-Image verfügbar
  # (ADR-001-REVIEW Befund C3 — Session Pooling für NL2SQL SET LOCAL) ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: odoo_db
    restart: unless-stopped
    # Non-sensitive vars aus .env.prod (POSTGRES_USER, POSTGRES_DB)
    # Passwort aus /run/secrets/ via POSTGRES_PASSWORD_FILE (ADR-045)
    env_file: .env.prod
    volumes:
      - odoo_pgdata:/var/lib/postgresql/data
      # Init-Script: einmalig ausgeführt wenn Volume leer (idempotent: IF NOT EXISTS).
      # Erstellt nl2sql_ro Read-Only Role. Muss nach Modul-Installation erneut
      # per `docker exec odoo_db psql -U $POSTGRES_USER -d $POSTGRES_DB -f /init.sql`
      # ausgeführt werden falls neue Tabellen geGRANTet werden sollen.
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      # Secrets aus /run/secrets/ für POSTGRES_PASSWORD_FILE (ADR-045)
      - /run/secrets:/run/secrets:ro
    # PostgreSQL-Tuning für CPX32 (4 vCPU, 8 GB RAM).
    # Werte basieren auf: https://pgtune.leopard.in.ua/ für "Web Application", 8GB RAM.
    command: >
      postgres
        -c max_connections=50
        -c shared_buffers=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1536MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_statement=ddl
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
        -c log_timezone=Europe/Berlin
    healthcheck:
      # Prüft PostgreSQL-Verfügbarkeit UND ob die Zieldatenbank existiert.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

volumes:
  odoo_data:
    name: odoo_hub_data        # Expliziter Name für Backup-Scripts
  odoo_pgdata:
    name: odoo_hub_pgdata      # Expliziter Name für Backup-Scripts
  traefik_certs:
    name: odoo_hub_traefik_certs

networks:
  # Internes Netzwerk: DB und PgBouncer sind nicht vom Internet erreichbar.
  internal:
    name: odoo_hub_internal
    internal: true
  # Proxy-Netzwerk: Traefik und Odoo-Web kommunizieren hier.
  proxy:
    name: odoo_hub_proxy
