# docker-compose.prod.yml — odoo-hub Production Stack
# Target: Hetzner CPX32 (4 vCPU, 8 GB RAM, 160 GB Disk), odoo-prod (46.225.127.211)
# Stack: Traefik v3.3 + Odoo 18 + PostgreSQL 16
#
# Secrets Management (ADR-045 — Variante C: Hybrid SOPS + file-based):
#   - Sensitive Werte (Passwörter) kommen aus /run/secrets/ (tmpfs, ADR-045)
#   - Non-sensitive Compose-Interpolation (.env.prod) für ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG
#   - .env.prod wird im CI/CD aus /run/secrets/ generiert (kein manuelles Editieren)
#   - Nach Reboot: secrets-check.service blockiert Docker bis CI/CD re-deployed
#
# Anforderungen:
#   - Docker >= 25, Compose V2
#   - /run/secrets/ befüllt via CI/CD (SOPS-Decrypt, ADR-045 Phase 5)
#   - .env.prod generiert via CI/CD aus /run/secrets/ (ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG)
#   - docker/db/init.sql vorhanden (nl2sql_ro Role Setup)
#
# Idempotent: mehrfaches `docker compose up -d` ist sicher.
# Netzwerk: DB + PgBouncer nur intern erreichbar (internal: true).
# Ressourcen: Limits verhindern, dass NL2SQL-Queries den Host erschöpfen.

services:

  # ── Traefik Reverse Proxy ──────────────────────────────────────────────────
  # NOTE: Requires Docker ≤27.x (MinAPIVersion=1.24).
  # Docker 28+ raised MinAPIVersion to 1.44 which breaks Traefik's initial
  # /v1.24/version handshake. Pin Docker to 27.5.1 on the host.
  traefik:
    image: traefik:v3.3
    container_name: odoo_traefik
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - proxy

  # ── Odoo 18 Web ────────────────────────────────────────────────────────────
  web:
    image: odoo:18.0
    container_name: odoo_web
    restart: unless-stopped
    # Non-sensitive Compose-Vars (ODOO_DOMAIN, ACME_EMAIL, IMAGE_TAG, POSTGRES_USER, POSTGRES_DB)
    # Passwörter werden NUR über /run/secrets/ übergeben (ADR-045).
    env_file: .env.prod
    # Kein direktes Port-Mapping — Traffic läuft ausschließlich über Traefik
    expose:
      - "8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
      # Secrets aus /run/secrets/ als Read-Only in Container mounten (ADR-045)
      - /run/secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - PORT=5432
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=odoo_hub_proxy"
      - "traefik.http.routers.odoo.rule=Host(`${ODOO_DOMAIN}`)"
      - "traefik.http.routers.odoo.entrypoints=websecure"
      - "traefik.http.routers.odoo.tls.certresolver=le"
      - "traefik.http.services.odoo.loadbalancer.server.port=8069"
      # Odoo Websocket (longpolling)
      - "traefik.http.routers.odoo-longpoll.rule=Host(`${ODOO_DOMAIN}`) && PathPrefix(`/longpolling`)"
      - "traefik.http.routers.odoo-longpoll.entrypoints=websecure"
      - "traefik.http.routers.odoo-longpoll.tls.certresolver=le"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── aifw NL2SQL Microservice ────────────────────────────────────────────────
  # Internal only — not exposed via Traefik. Odoo calls it via http://aifw_service:8001
  # Needs 'proxy' network for outbound LLM API calls (Anthropic/OpenAI).
  # ALLOWED_HOSTS=["*"] + MIDDLEWARE=[] required: container name 'aifw_service'
  # contains underscore which fails RFC 1034 hostname validation in Django.
  aifw_service:
    build:
      context: .
      dockerfile: services/aifw_service/Dockerfile
    container_name: aifw_service
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=aifw_service.settings
      - DJANGO_SECRET_KEY=${AIFW_SECRET_KEY}
      - AIFW_DB_HOST=db
      - AIFW_DB_NAME=${AIFW_DB_NAME:-aifw}
      - AIFW_DB_USER=${AIFW_DB_USER:-aifw}
      - AIFW_DB_PASSWORD=${AIFW_DB_PASSWORD}
      - ODOO_DB_HOST=db
      - ODOO_DB_NAME=${POSTGRES_DB}
      - ODOO_NL2SQL_USER=nl2sql_user
      - ODOO_NL2SQL_PASSWORD=${ODOO_NL2SQL_PASSWORD}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - internal
      - proxy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── PostgreSQL 16
  # NOTE: PgBouncer wird nachgerüstet sobald passendes Docker-Image verfügbar
  # (ADR-001-REVIEW Befund C3 — Session Pooling für NL2SQL SET LOCAL) ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: odoo_db
    restart: unless-stopped
    # Non-sensitive vars aus .env.prod (POSTGRES_USER, POSTGRES_DB)
    # Passwort aus /run/secrets/ via POSTGRES_PASSWORD_FILE (ADR-045)
    env_file: .env.prod
    volumes:
      - odoo_pgdata:/var/lib/postgresql/data
      # Init-Script: einmalig ausgeführt wenn Volume leer (idempotent: IF NOT EXISTS).
      # Erstellt nl2sql_ro Read-Only Role. Muss nach Modul-Installation erneut
      # per `docker exec odoo_db psql -U $POSTGRES_USER -d $POSTGRES_DB -f /init.sql`
      # ausgeführt werden falls neue Tabellen geGRANTet werden sollen.
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./docker/db/02_aifw_db.sh:/docker-entrypoint-initdb.d/02_aifw_db.sh:ro
      # Secrets aus /run/secrets/ für POSTGRES_PASSWORD_FILE (ADR-045)
      - /run/secrets:/run/secrets:ro
    # PostgreSQL-Tuning für CPX32 (4 vCPU, 8 GB RAM).
    # Werte basieren auf: https://pgtune.leopard.in.ua/ für "Web Application", 8GB RAM.
    command: >
      postgres
        -c max_connections=50
        -c shared_buffers=512MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c effective_cache_size=1536MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_statement=ddl
        -c log_min_duration_statement=1000
        -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
        -c log_timezone=Europe/Berlin
    healthcheck:
      # Prüft PostgreSQL-Verfügbarkeit UND ob die Zieldatenbank existiert.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G

  # ── Prometheus ───────────────────────────────────────────────────────────────
  # Layer 2: System metrics scraping. Internal only — no Traefik exposure.
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: odoo_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    depends_on:
      - node_exporter
      - postgres_exporter
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Node Exporter ────────────────────────────────────────────────────────────
  # Layer 2: Host system metrics (CPU, RAM, Disk, Network).
  node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: odoo_node_exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ── postgres_exporter ────────────────────────────────────────────────────────
  # Layer 2: PostgreSQL metrics for Prometheus (connections, query stats, cache).
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: odoo_postgres_exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://grafana_ro:${GRAFANA_RO_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    expose:
      - "9187"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ── Loki ─────────────────────────────────────────────────────────────────────
  # Layer 3: Log aggregation backend.
  loki:
    image: grafana/loki:3.0.0
    container_name: odoo_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    expose:
      - "3100"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Promtail ─────────────────────────────────────────────────────────────────
  # Layer 3: Log shipper — tails Odoo + aifw container logs → Loki.
  promtail:
    image: grafana/promtail:3.0.0
    container_name: odoo_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./grafana/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Read-Only PostgreSQL datasource via grafana_ro user (nl2sql_ro role).
  # Provisioning: datasources + dashboards aus ./grafana/provisioning/
  # Passwort via GRAFANA_RO_PASSWORD (aus /run/secrets/).
  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: odoo_grafana
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SMTP_ENABLED=false
      - GRAFANA_RO_PASSWORD=${GRAFANA_RO_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=odoo_hub_proxy"
      - "traefik.http.routers.odoo-grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.odoo-grafana.entrypoints=websecure"
      - "traefik.http.routers.odoo-grafana.tls.certresolver=le"
      - "traefik.http.services.odoo-grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  odoo_data:
    name: odoo_hub_data        # Expliziter Name für Backup-Scripts
  odoo_pgdata:
    name: odoo_hub_pgdata      # Expliziter Name für Backup-Scripts
  traefik_certs:
    name: odoo_hub_traefik_certs
  aifw_pgdata:
    name: odoo_hub_aifw_pgdata # aifw eigene DB (LLMProvider, AIActionType, UsageLogs, SchemaSource)
  grafana_data:
    name: odoo_hub_grafana_data
  prometheus_data:
    name: odoo_hub_prometheus_data
  loki_data:
    name: odoo_hub_loki_data

networks:
  # Internes Netzwerk: DB nicht vom Internet erreichbar.
  internal:
    name: odoo_hub_internal
    internal: true
  # Proxy-Netzwerk: Traefik und Odoo-Web kommunizieren hier.
  proxy:
    name: odoo_hub_proxy
