apiVersion: 1

datasources:
  - name: PostgreSQL (odoo)
    type: postgres
    uid: odoo_pg
    url: odoo_db:5432
    user: grafana_ro
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: ${GRAFANA_RO_PASSWORD}
    isDefault: true
    editable: true

  - name: Prometheus
    type: prometheus
    uid: odoo_prometheus
    url: http://prometheus:9090
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 2.51.0
      timeInterval: 15s
    isDefault: false
    editable: true

  - name: Loki
    type: loki
    uid: odoo_loki
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      timeout: 60
    isDefault: false
    editable: true
