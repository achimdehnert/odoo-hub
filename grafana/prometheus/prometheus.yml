global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    stack: odoo-hub

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: odoo-prod

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: odoo-db

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
