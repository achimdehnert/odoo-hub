# Docker Socket Proxy — Nginx configuration
# Rewrites legacy Docker API versions (< 1.44) to 1.44 so that
# Docker 29.x (MinAPIVersion=1.44) accepts requests from clients
# that hardcode old API versions (e.g. Traefik's /v1.24/version).

user root;
worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /dev/stdout;
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;

    server {
        listen 2375;
        server_name _;

        # Rewrite /v1.{1..43}/ to /v1.44/ so Docker 29.x (MinAPIVersion=1.44)
        # accepts requests from clients that hardcode old API versions.
        location ~ ^/v1\.[0-3][0-9](/|$) {
            rewrite ^/v1\.[0-9]+(/.*)?$ /v1.44$1 break;
            proxy_pass http://unix:/var/run/docker.sock;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host docker;
        }

        location ~ ^/v1\.4[0-3](/|$) {
            rewrite ^/v1\.[0-9]+(/.*)?$ /v1.44$1 break;
            proxy_pass http://unix:/var/run/docker.sock;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host docker;
        }

        # All other requests (v1.44+) pass through unchanged
        location / {
            proxy_pass http://unix:/var/run/docker.sock;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host docker;
        }
    }
}
