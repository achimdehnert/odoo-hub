name: Deploy odoo-hub (prod | staging)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy-Ziel (push auf main deployt immer prod)"
        type: choice
        options:
          - staging
          - prod
        default: staging

# ── Ziel-Auflösung (Retro R4, platform#913) ──────────────────────────────────
# push auf main            → prod  (inputs.target ist leer → Fallback 'prod')
# workflow_dispatch        → Input `target`, Default STAGING (Safety-Default:
#                            manueller Klick deployt nie versehentlich Prod).
#
# Staging läuft auf DEMSELBEN Host wie Prod (Hetzner CPX32, 46.225.127.211).
# Evidenz: docker-compose.staging.yml Header ("Zwei isolierte Stacks auf
# demselben Host", "gemeinsamer Traefik aus prod") + Netzwerk staging_proxy =
# externer Alias auf odoo_hub_proxy (existiert nur auf dem Prod-Host).
#
# Profil-Mapping Staging: v18 (= Klon der Prod-Konfiguration) — das einfachste
# lauffähige Mapping. Der v19-Stack (Odoo-19-Migrationstest) wird weiterhin
# manuell gestartet:
#   docker compose -f docker-compose.staging.yml --profile v19 --env-file .env.staging up -d
#
# TODO(staging): DEPLOY_PATH für staging (/opt/odoo-hub-staging) ist ein klar
# markierter Default — bitte bestätigen/anpassen, falls das Staging-Checkout
# auf dem Server woanders liegt. Die Compose-Env-Datei (.env.staging) wird
# NICHT vom CI generiert (kein SOPS-Mapping für STAGING_*-Keys) und muss auf
# dem Server im Staging-Pfad vorliegen; der Deploy bricht sonst laut ab.
env:
  DEPLOY_TARGET: ${{ inputs.target || 'prod' }}
  DEPLOY_HOST: root@46.225.127.211
  DEPLOY_PATH: ${{ (inputs.target || 'prod') == 'staging' && '/opt/odoo-hub-staging' || '/opt/odoo-hub' }}
  COMPOSE_FILE: ${{ (inputs.target || 'prod') == 'staging' && 'docker-compose.staging.yml' || 'docker-compose.prod.yml' }}
  COMPOSE_ENV_FILE: ${{ (inputs.target || 'prod') == 'staging' && '.env.staging' || '.env.prod' }}
  COMPOSE_PROFILE_ARGS: ${{ (inputs.target || 'prod') == 'staging' && '--profile v18' || '' }}
  WEB_SERVICE: ${{ (inputs.target || 'prod') == 'staging' && 'staging_v18_web' || 'web' }}
  ODOO_DB: ${{ (inputs.target || 'prod') == 'staging' && 'odoo_staging_v18' || 'odoo' }}

jobs:
  # ── Job 1: Secrets entschlüsseln + auf Server deployen ─────────────────────
  # Läuft für BEIDE Targets: prod und staging teilen sich den Host, und
  # /run/secrets/ wird idempotent (identischer Inhalt) neu geschrieben.
  secrets:
    name: Deploy Secrets via SOPS
    runs-on: ubuntu-latest
    steps:
      # Der secrets-Kontext ist in Job-level `if` nicht verfügbar — die frühere
      # Zeile `if: ${{ secrets.SOPS_AGE_KEY != '' }}` invalidierte das gesamte
      # Workflow-File (0s-Fail, 0 Jobs, auf jedem Push). Guard daher als
      # Fail-Fast-Step: ohne Secret bricht der Deploy laut ab statt still.
      - name: Verify SOPS_AGE_KEY configured
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          if [ -z "${SOPS_AGE_KEY}" ]; then
            echo "FEHLER: Secret SOPS_AGE_KEY nicht gesetzt — Deploy abgebrochen (Fork / Secret fehlt)." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Install sops + age
        run: |
          # sops
          SOPS_VERSION="3.9.4"
          curl -fsSL "https://github.com/mozilla/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64" \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops

          # age
          AGE_VERSION="1.1.1"
          curl -fsSL "https://github.com/FiloSottile/age/releases/download/v${AGE_VERSION}/age-v${AGE_VERSION}-linux-amd64.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin age/age age/age-keygen

          sops --version
          age --version

      - name: Verify secrets.enc.env exists
        run: |
          if [[ ! -f secrets.enc.env ]]; then
            echo "FEHLER: secrets.enc.env nicht gefunden."
            echo "  -> ./scripts/create-secrets.sh ausführen und committen."
            exit 1
          fi

      - name: Decrypt secrets + deploy to /run/secrets/
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          # SSH-Key einrichten
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.225.127.211 >> ~/.ssh/known_hosts

          # Entschlüsseln im Runner-Speicher (kein Plaintext auf Disk)
          DECRYPTED=$(sops -d secrets.enc.env)
          COUNT=0

          # Jeden Secret als separate Datei nach /run/secrets/ schreiben
          while IFS='=' read -r key value; do
            # Kommentare und leere Zeilen überspringen
            [[ -z "${key}" || "${key}" =~ ^# ]] && continue

            key_lower=$(echo "${key}" | tr '[:upper:]' '[:lower:]')

            # printf statt echo — verhindert trailing newline (kritisch für API-Keys)
            ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" \
              "mkdir -p /run/secrets && \
               printf '%s' '${value}' > /run/secrets/${key_lower} && \
               chmod 400 /run/secrets/${key_lower} && \
               chown root:root /run/secrets/${key_lower}"

            COUNT=$((COUNT + 1))
          done <<< "${DECRYPTED}"

          echo "Deployed ${COUNT} secrets to /run/secrets/ on ${DEPLOY_HOST}"

      - name: Verify required secrets on server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" '
            REQUIRED="postgres_password postgres_db postgres_user odoo_admin_passwd odoo_domain acme_email"
            MISSING=0
            for f in $REQUIRED; do
              if [ ! -s "/run/secrets/$f" ]; then
                echo "FATAL: Missing or empty secret: $f" >&2
                MISSING=$((MISSING + 1))
              fi
            done
            if [ $MISSING -gt 0 ]; then
              echo "$MISSING required secret(s) missing — deploy aborted." >&2
              exit 1
            fi
            echo "All required secrets verified ($(ls /run/secrets/ | wc -l) total)."
          '

  # ── Job 2: Docker Stack deployen ────────────────────────────────────────────
  deploy:
    name: Deploy Docker Stack
    runs-on: ubuntu-latest
    needs: secrets
    steps:
      - uses: actions/checkout@v4

      - name: Show resolved deploy target
        run: |
          echo "Target        : ${DEPLOY_TARGET}"
          echo "Host          : ${DEPLOY_HOST}"
          echo "Path          : ${DEPLOY_PATH}"
          echo "Compose file  : ${COMPOSE_FILE}"
          echo "Compose env   : ${COMPOSE_ENV_FILE}"
          echo "Profile args  : ${COMPOSE_PROFILE_ARGS:-<none>}"
          echo "Web service   : ${WEB_SERVICE}"
          echo "Odoo DB       : ${ODOO_DB}"

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 46.225.127.211 >> ~/.ssh/known_hosts

      - name: Sync repo to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='secrets.env' \
            --exclude='.env.prod' \
            --exclude='.env.staging' \
            --exclude='*.log' \
            ./ "${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Generate .env.prod from /run/secrets/
        if: env.DEPLOY_TARGET == 'prod'
        # Traefik und docker-compose.prod.yml benötigen einige Werte als Umgebungsvariablen
        # (ODOO_DOMAIN, ACME_EMAIL für Traefik-Labels + Healthcheck).
        # read_secret() liest aus /run/secrets/ — diese Bridge-Datei ist kein Secret-Store,
        # nur Compose-Interpolation. Passwörter stehen nur in /run/secrets/.
        run: |
          # Kein Heredoc: die frühere quoted+eingerückte ENVEOF-Variante schrieb
          # die $(cat …)-Kommandos LITERAL in .env.prod (Terminator matchte nie)
          # → odoo_web crashloopte an wait-for-psql (Incident 2026-07-04).
          # Jetzt: Echo-Block, Werte werden auf dem Server evaluiert.
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            set -e
            cd ${DEPLOY_PATH}
            umask 077
            {
              echo \"POSTGRES_USER=\$(cat /run/secrets/postgres_user 2>/dev/null || echo odoo)\"
              echo \"POSTGRES_DB=\$(cat /run/secrets/postgres_db 2>/dev/null || echo odoo)\"
              echo \"ODOO_DOMAIN=\$(cat /run/secrets/odoo_domain 2>/dev/null)\"
              echo \"ACME_EMAIL=\$(cat /run/secrets/acme_email 2>/dev/null)\"
              echo \"IMAGE_TAG=${GITHUB_SHA::8}\"
              echo \"POSTGRES_PASSWORD=\$(cat /run/secrets/postgres_password)\"
            } > .env.prod
            chmod 600 .env.prod
            # Sanity: keine unevaluierten Kommandos, alle Pflicht-Keys nicht leer
            if grep -q 'cat /run/secrets' .env.prod; then
              echo 'FEHLER: .env.prod enthält literale Kommandos' >&2; exit 1
            fi
            for k in POSTGRES_USER POSTGRES_DB ODOO_DOMAIN POSTGRES_PASSWORD; do
              grep -q \"^\${k}=..*\" .env.prod || { echo \"FEHLER: \${k} leer/fehlt in .env.prod\" >&2; exit 1; }
            done
          "

      - name: Verify staging compose env file exists on server
        if: env.DEPLOY_TARGET == 'staging'
        # .env.staging wird NICHT vom CI generiert (STAGING_*-Keys sind nicht
        # im SOPS-Mapping). Sie muss manuell auf dem Server gepflegt werden —
        # ohne sie bricht der Deploy hier laut ab statt später kryptisch.
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            if [ ! -s '${DEPLOY_PATH}/${COMPOSE_ENV_FILE}' ]; then
              echo 'FEHLER: ${COMPOSE_ENV_FILE} fehlt/leer in ${DEPLOY_PATH} — Staging-Deploy abgebrochen.' >&2
              echo '  -> Compose-Env-Datei mit STAGING_V18_* Werten auf dem Server anlegen (chmod 600).' >&2
              exit 1
            fi
            for k in STAGING_V18_DB_PASSWORD STAGING_V18_DOMAIN; do
              grep -q \"^\${k}=..*\" '${DEPLOY_PATH}/${COMPOSE_ENV_FILE}' \
                || { echo \"FEHLER: \${k} leer/fehlt in ${COMPOSE_ENV_FILE}\" >&2; exit 1; }
            done
            echo 'Staging compose env file verified.'
          "

      - name: Docker Compose up
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            cd ${DEPLOY_PATH}
            docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} pull --quiet || true
            docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} up -d --force-recreate --remove-orphans
            docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} ps
          "

      - name: Odoo module update (odoo -u)
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            cd ${DEPLOY_PATH}
            echo 'Waiting for Odoo to be ready...'
            sleep 20
            MODULES=\"iil_dashboard_core,casting_foundry,scm_manufacturing,mfg_machining,iil_configurator,mfg_management,mfg_nl2sql\"
            echo \"Running: odoo -u \${MODULES} -d ${ODOO_DB} (service ${WEB_SERVICE})\"
            docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} run --rm ${WEB_SERVICE} \\
              odoo -u \"\${MODULES}\" --stop-after-init -d ${ODOO_DB} 2>&1 | tail -20
            EXIT_CODE=\$?
            if [ \$EXIT_CODE -ne 0 ]; then
              echo 'ERROR: odoo -u failed with exit code '\$EXIT_CODE >&2
              exit \$EXIT_CODE
            fi
            echo 'Module update successful.'
          "

      - name: Restart Odoo web after update
        run: |
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            cd ${DEPLOY_PATH}
            # Always use --env-file so ODOO_DOMAIN label is set correctly.
            # Without it Traefik gets Host(``) and returns 404 for all requests.
            docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} up -d --no-deps ${WEB_SERVICE}
            sleep 15
            if [ '${DEPLOY_TARGET}' = 'prod' ]; then
              # Nur Prod hat einen eigenen Traefik. Staging nutzt den Prod-Traefik
              # (staging_proxy = externer Alias auf odoo_hub_proxy) und darf ihn
              # bei einem Staging-Deploy NICHT anfassen.
              docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} up -d --no-deps traefik
              sleep 5
            fi
          "

      - name: Health check
        run: |
          sleep 10
          ssh -i ~/.ssh/id_ed25519 "${DEPLOY_HOST}" "
            if [ '${DEPLOY_TARGET}' = 'prod' ]; then
              DOMAIN=\$(cat /run/secrets/odoo_domain 2>/dev/null)
            else
              DOMAIN=\$(grep '^STAGING_V18_DOMAIN=' '${DEPLOY_PATH}/${COMPOSE_ENV_FILE}' | cut -d= -f2)
            fi
            if [ -z \"\${DOMAIN}\" ]; then
              echo 'FEHLER: Health-Check-Domain konnte nicht ermittelt werden.' >&2
              exit 1
            fi
            if curl -sf --max-time 15 \"https://\${DOMAIN}/web/health\" > /dev/null; then
              echo \"Health check passed (https://\${DOMAIN}).\"
            else
              echo 'Health check failed — Logs:' >&2
              cd ${DEPLOY_PATH}
              docker compose -f ${COMPOSE_FILE} ${COMPOSE_PROFILE_ARGS} --env-file ${COMPOSE_ENV_FILE} logs --tail=50 ${WEB_SERVICE} >&2
              exit 1
            fi
          "
